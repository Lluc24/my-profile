  - title: Machine Learning Research Intern
    organization: Barcelona Supercomputing Center
    employment_type: Internship
    start_date: 2025-07
    end_date: 2025-08
    location: Barcelona, Catalonia, Spain
    location_type: On-site
    description: >
      During my summer internship at the Barcelona Supercomputing Center (BSC)
      in the Workflows and Distributed Computing group, directed by Rosa M.
      Badia and mentored by researcher Eduardo Iraola, I built and trained the
      first large language model (LLM) specialized in PyCOMPSs, the group's
      Python framework for task-based parallelism on clusters. General LLMs
      have barely seen PyCOMPSs during pre-training and hallucinate when asked
      for it, yet many teams using BSC's supercomputers need it to run their
      code in parallel without being parallel programming experts. The goal
      was a model that generates PyCOMPSs-parallelized Python code from
      either a sequential program or a plain-text description.

      I owned the project end to end. I first learned PyCOMPSs by writing my
      own parallel applications, including a distributed Q-learning agent,
      then implemented and updated more than 30 parallel applications in the
      PyCOMPSs examples repository (linear algebra, sorting, a convolutional
      neural network, Mandelbrot and others), representative of the workloads
      typically run with the framework, so they were runnable, consistent and
      reliable enough to become training data. On top of that corpus I
      implemented a CLI pipeline, covered by unit and black-box tests, that
      scrapes each application, automatically derives a sequential version of
      the parallel code and validates it by execution, and assembles two
      instruction datasets: sequential code to parallel code, and description
      to parallel code. The pipeline can also reconstruct runnable source
      files back from any dataset for inspection and debugging.

      Finally I fine-tuned CodeLlama 7B with LoRA adapters on multi-GPU nodes
      of MareNostrum 5. Real applications tokenize far beyond common defaults
      (up to 7,469 tokens against a 700-token default), which first caused
      silent truncation and then CUDA out-of-memory crashes. I wrote a
      lightweight training script from scratch to isolate the memory
      behaviour, found a stable configuration (per-device batch size 2 with
      16 gradient accumulation steps and fp16), diagnosed a silent hang
      caused by mismatched Python modules between the cluster's
      general-purpose and accelerated partitions, and ported the working
      settings back into the pipeline for reproducible, checkpointed
      training. The result was the first fine-tuned models for PyCOMPSs code
      generation, verified against training prompts and by manual inspection
      and documented in an internship report. Both my director and my mentor
      published LinkedIn recommendations describing this work.
    key_points:
      - Fine-tuned CodeLlama 7B into the first LLM able to write PyCOMPSs code
      - Implemented and updated 30+ parallel apps mirroring real HPC workloads
      - Built a unit-tested pipeline turning the apps into 2 LLM datasets
      - Tamed CUDA OOM on MareNostrum 5 to train with 7,500-token prompts

