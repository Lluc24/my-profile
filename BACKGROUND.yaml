  - title: Balsells Research Fellow
    organization: University of California, Irvine
    employment_type: Full-time
    start_date: 2026-02
    end_date: 2026-07
    location: Irvine, California, United States
    location_type: On-site
    description: >
      I completed a six-month research stay as a Balsells Research Fellow at
      the Donald Bren School of Information and Computer Sciences, University
      of California, Irvine, supervised by Professor Vijay Vazirani, one of
      the leading figures in algorithmic game theory, recipient of the 2022
      John von Neumann Theory Prize and an ACM Fellow. The fellowship, funded
      by the Balsells Foundation and awarded each semester to up to three
      engineering students from Catalonia, also served as my Bachelor's
      Senior Project at the Universitat Politècnica de Catalunya (UPC),
      co-advised by Professor Maria José Serna Iglesias. My core deliverable
      was the first public implementation of a novel combinatorial algorithm
      that Professor Vazirani had recently designed and published
      (arXiv:2402.11437, accepted at ACM EC, the premier conference on
      economics and computation) for computing the leximin core imputation
      of the assignment game: the unique profit allocation that
      lexicographically maximizes the outcome of the worst-off agent
      first, then the next worst-off, and so on, while remaining stable
      within the cooperative game's core. I built the solver in Python with
      exact rational arithmetic, using NetworkX for maximum-weight matching,
      and open-sourced it under the MIT license at github.com/Lluc24/leximin.
      Around it I built an independent LP-based reference solver (PuLP) to
      cross-check correctness, a seeded random graph generator for degenerate
      and non-degenerate benchmark families, and a reproducible experimental
      pipeline that validated the algorithm's output on 1,320 generated
      instances and showed runtime and memory scaling consistent with the
      theoretical bounds (O(n^5) and O(n^2) on dense graphs). The broader
      research context spanned matching theory, graph theory and cooperative
      game theory. I presented and defended the resulting thesis at the
      Facultat d'Informàtica de Barcelona (FIB), UPC, on July 1, 2026, before
      a three-member tribunal, receiving a final grade of 9.6/10.
    key_points:
      - Built the first public implementation of Vazirani's leximin algorithm
      - Turned a paper accepted at ACM EC into a working open-source solver
      - Awarded the Balsells Fellowship, at most 3 granted per semester
      - Earned a 9.6/10 defending the thesis at UPC as my Senior Project

