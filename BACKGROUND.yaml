  - title: Visiting Student
    organization: Programming Methods Lab, EPFL
    employment_type: Internship
    start_date: 2025-09
    end_date: 2026-01
    duration: 5 mos
    location: Lausanne, Vaud, Switzerland
    location_type: On-site
    description: >
      During my exchange at EPFL, I completed a 12 ECTS research project at the
      Laboratoire de Méthodes de Programmation (LAMP) under the direction of
      Prof. Martin Odersky (the creator of Scala and author of javac) and
      Matthieu Bovel. My research addressed a fundamental stability flaw in the
      Scala 3 compiler: the non-deterministic divergence of recursive Match
      Types. Previously, the compiler relied on catching JVM StackOverflowError
      to handle infinite type reductions, a practice that is fundamentally
      unsafe due to potential leaked locks and bypassed cleanup blocks. I
      designed and implemented a static divergence checking algorithm to
      replace this runtime detection with a formal termination guarantee.

      The project culminated in PR #24661
      (https://github.com/scala/scala3/pull/24661), where I introduced a
      mechanism that tracks type-reduction history and identifies "domination"
      through complexity vectors (structural AST node counts) and covering set
      analysis. By applying a formal termination proof based on a generalized
      Dickson's Lemma, the algorithm ensures the type-checker always terminates
      while remaining flexible enough for complex value-level iterations like
      Peano arithmetic. My work includes detailed diagnostic reporting and
      extensive compiler safety improvements; it was awarded the maximum grade
      of 6.0/6.0.
    keywords:
      - Software Development
      - Test Engineering
      - Algorithms
      - Compilers
      - Formal Verification
      - Scala
    key_points:
      - Designed divergence check for Match Types in Scala 3 compiler (PR #24661)
      - Supervised by Martin Odersky (Scala creator and javac author) and Matthieu Bovel
      - Prevented compiler crashes by replacing recursion limits with termination proofs
      - Achieved 100% detection of failures while ensuring all valid code compiles

