projects:
  - name: Leximin Fair Core Imputation for Cooperative Games
    repo: leximin
    github: github.com/Lluc24/leximin
    description: >
      First public Python implementation of Vijay Vazirani's combinatorial
      algorithm for computing the leximin core imputation of the assignment
      game (arXiv:2402.11437), a paper accepted at ACM EC, the premier
      conference on economics and computation, that existed only as
      abstract theory until this implementation; open-sourced under the
      MIT license. The algorithm classifies every vertex and edge as
      essential, viable or subpar, then runs a clock-based primal-dual
      event loop over fundamental components to converge on the unique
      leximin-optimal imputation, in O(mn^3) time and O(n^2) space.
      The implementation uses exact rational arithmetic
      (fractions.Fraction) throughout instead of floats, since an earlier
      float-based prototype produced incorrect tightness decisions on
      near-degenerate instances; it uses NetworkX for the underlying
      maximum-weight matching calls. I built two supporting components to
      make the result trustworthy on its own: an independent LP-based
      reference solver (PuLP with the CBC backend) for cross-validation, and
      a random bipartite graph generator producing both degenerate and
      non-degenerate families across a range of sizes and densities with
      fixed seeds for full reproducibility. Using that generator, I built a
      benchmark suite of 1,320 graph instances (n from 4 to 67, three edge
      densities, ten seeds per configuration) to cross-validate every
      instance against the LP solver within a 1e-6 tolerance, and profiled
      runtime (cProfile) and peak memory (tracemalloc) across the same
      instances. Fitting ordinary least squares regressions to the log-log
      transformed data showed runtime scaling consistent with O(n^5) and
      memory scaling consistent with O(n^2) on dense graphs, in line with the
      theoretical bounds. The project includes a full pytest suite,
      structured logging and a CLI entry point; the accompanying thesis and
      all supporting documentation are at github.com/Lluc24/leximin-docs.
    key_points:
      - Implemented the O(mn^3) clock-based primal-dual solver in pure Python
      - Chose exact rational arithmetic after floats broke edge cases
      - Cross-checked 1,320 seeded instances against an independent LP solver
      - Benchmarks matched theoretical O(n^5) time and O(n^2) memory bounds

  - name: Static Divergence Checking for Scala 3 Match Types
    repo: match_types_divergence_check
    github: github.com/Lluc24/match_types_divergence_check
    description: >
      Research project turned language proposal for Scala 3, born at
      the Programming Methods Laboratory (LAMP) of the École
      Polytechnique Fédérale de Lausanne (EPFL) under the supervision
      of Martin Odersky, the creator of Scala and author of javac,
      and Matthieu Bovel. Match types, a core feature of type-level
      programming in Scala 3, can diverge during reduction; the
      compiler detected this by catching StackOverflowError at
      runtime, an unsafe practice since the JVM does not guarantee
      cleanup after a stack overflow (documented JDK issues include
      bypassed finally blocks and locks left held) and the behavior
      varies with platform and stack size. I designed a static check
      that rejects potentially infinite reductions at compile time:
      it extends the domination criterion of SIP-31 (byname
      implicits) to match type argument lists, detecting both cycles
      and strict structural growth over stable covering sets, with an
      exemption for value-level iteration through compiletime.ops and
      a grace threshold that keeps the full Scala 3 test suite and
      known ecosystem patterns compiling unchanged. Through three
      lemmas building on a generalized Dickson's Lemma, I proved by
      contradiction that no reduction can run forever under the
      check. I converged on the final pointwise-dominance algorithm
      after three iterations and implemented it in the Scala 3
      compiler (scala/scala3 PR #24661): every infinite reduction,
      without exception, is now caught at compile time and reported
      through dedicated error messages carrying the full reduction
      trace. After an in-person presentation, Martin Odersky and the
      LAMP team endorsed the work for the Scala Improvement Process:
      the pre-SIP passed community discussion with the SIP committee
      chair calling it excellent work that should be enshrined as a
      SIP, and it now stands as a formal proposal (PR #136 in
      scala/improvement-proposals) that will set, for future versions
      of the language, both the rules a match type must satisfy to
      compile and the guards by which the compiler detects and
      rejects infinite reductions.
    key_points:
      - Designed a check catching 100% of infinite reductions (PR #24661)
      - Supervised by Martin Odersky, creator of Scala and author of javac
      - Backed by a three-lemma termination proof generalizing Dickson's Lemma
      - Extended SIP-31's criterion with covering sets and complexity vectors
      - Kept the full Scala 3 test suite and ecosystem compiling unchanged
      - Scala Improvement Process (PR #136) to define Match Types behavior

  - name: Coronary Heart Disease Risk Prediction
    repo: ML_Project1
    github: github.com/Lluc24/ML_Project1
    description: >
      EPFL CS-433 machine learning project focused on predicting coronary heart
      disease risk from large-scale CDC health data.
    key_points:
      - Trained and evaluated models on 328k+ samples and 321 raw features with heavy missing data and class imbalance
      - Implemented robust preprocessing and leakage-safe cross-validation workflow, including threshold optimization
      - Achieved final model performance of 0.868 accuracy and 0.424 F1-score (project grade: 8.5/10)

  - name: Distributed Reinforcement Learning in Multi-Agent Environments
    repo: multiagent-RL
    github: github.com/Lluc24/multiagent-RL
    description: >
      Course project on multi-agent reinforcement learning in partially
      observable environments, combining joint-action learning with
      game-theoretic solution concepts.
    key_points:
      - Implemented and analyzed coordination strategies based on Pareto, Nash, Welfare, and Minimax solution concepts
      - Integrated experiment tracking and sweeps to compare convergence, reward trade-offs, and generalization behavior
      - Contributed to a high-performing delivery with bonus REINFORCE implementation (final project grade: 11.75/12)

  - name: miniJ Interpreter
    repo: miniJ
    github: github.com/Lluc24/miniJ
    description: >
      Interpreter for a simplified J/APL-like language, implemented in Python
      with ANTLR and NumPy as part of a programming languages course.
    key_points:
      - Built a full interpreter pipeline covering lexical, syntactic, and semantic processing for language G
      - Structured the runtime with separate visitor and execution engine components for maintainability and scalability
      - Delivered comprehensive test programs for arithmetic, boolean, functional, and semantic-error handling cases (grade: 10/10)

  - name: Django Template with Gemini Chat Integration
    repo: django-base
    github: github.com/Lluc24/django-base
    description: >
      Extensible Django starter project with base pages, contact workflows,
      and an AI advisor chatbot powered by Google Gemini.
    key_points:
      - Developed a modular Django foundation with reusable app structure for rapid project bootstrapping
      - Added Gemini-based chat functionality with session-backed conversation flow
      - Included production-ready baseline components (home/about/contact, forms, migrations, and clear setup docs)

  - name: Factpostor Party Game
    repo: factpostor
    github: github.com/Lluc24/factpostor
    description: >
      Browser-based social deduction game for 3 to 10 players where users
      distinguish true facts from improvised misinformation.
    key_points:
      - Built a no-dependency single-device game with private role reveals, round flow, and voting mechanics
      - Designed the gameplay/state model for repeated rounds and pass-and-play interaction
      - Curated and integrated a 160+ fact dataset for replayability and low setup friction

